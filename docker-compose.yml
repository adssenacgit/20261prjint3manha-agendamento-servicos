services:
  mysql57:
    image: mysql:5.7
    container_name: agendamento-api-mysql57
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: 20261_prjint3_manha_ruimarsilvano
      MYSQL_USER: senac
      MYSQL_PASSWORD: senac
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    command: --character-set-server=latin1 --collation-server=latin1_swedish_ci
    volumes:
      - mysql57_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  mysql57_data:
